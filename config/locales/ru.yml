    about:
      title: "О проекте"
      content: "Это учебный веб-проект (курсовая работа) для оценивания изображений пользователями. Зарегистрированные участники выбирают тему, просматривают изображения и выставляют оценки от 1 до 5; система сохраняет оценки и рассчитывает среднее значение по каждому изображению."
