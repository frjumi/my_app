        work_title: "Работа"
        work: "Рабочая область: выбор темы, просмотр изображений, перелистывание, выставление оценки звёздами (1–5) с кнопкой «Отправить оценку»."
        images_title: "Изображения"
        images: "Список всех изображений: название, тема, количество и средняя оценка, ваша оценка (если вы вошли в систему). Добавление, редактирование и удаление."
        themes_title: "Темы"
        themes: "Список тем и количество изображений в каждой. Управление темами: добавление, редактирование, удаление."
